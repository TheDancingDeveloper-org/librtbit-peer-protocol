name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GIT_AUTH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
