name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_FORGEJO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  check:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."http://x-access-token:${{ secrets.GIT_AUTH_TOKEN }}@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
